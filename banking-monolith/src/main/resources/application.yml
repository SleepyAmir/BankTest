server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: banking-monolith
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_monolith_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: public
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    com.springbank: DEBUG
