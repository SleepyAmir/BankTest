server:
  port: 8092

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5436/banking_audit_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
