server:
  port: 8088

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: transaction-write
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5438}/${DB_NAME:banking_transaction_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

services:
  monolith:
    url: ${MONOLITH_URL:http://localhost:8081}
